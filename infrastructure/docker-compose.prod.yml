version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: estet_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-estet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-estet_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-estet}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - estet_network

  vision-api:
    build:
      context: ./services/vision-api
      dockerfile: Dockerfile
    container_name: estet_vision_api_prod
    env_file:
      - .env
    ports:
      - "${VISION_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - estet_network

  parser:
    build:
      context: ./services/parser
      dockerfile: Dockerfile
    container_name: estet_parser_prod
    env_file:
      - .env
    volumes:
      - parser_images:/app/data/images
      - parser_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"  # Parser запускается по расписанию
    networks:
      - estet_network

  nginx:
    image: nginx:alpine
    container_name: estet_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - vision-api
    restart: always
    networks:
      - estet_network

volumes:
  postgres_data:
  parser_images:
  parser_logs:

networks:
  estet_network:
    driver: bridge
